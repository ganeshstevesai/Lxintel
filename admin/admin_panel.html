<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zane & west Law and Firms Admin Panel</title>
  <link rel="icon" type="image/webp" href="/Designer.png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      font-family: "Montserrat", sans-serif;
      background-color: #ffffff;
      color: #0d6efd;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at top, #05101a, #000000 70%);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(255, 255, 255, 0.85);
      z-index: -1;
    }

    /* LOGIN PAGE STYLES */
    .login-page-wrapper {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0px;
      box-sizing: border-box;
      z-index: 10;
    }

    .login-page-content {
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      text-align: center;
    }

    .login-logo-section {
      margin-bottom: 3rem;
    }

    .login-logo-section img {
      width: 140px;
      height: auto;
      margin-bottom: 1rem;
      display: inline-block;
      filter: drop-(0 0 18px rgba(13, 110, 253, 0.7));
    }

    .login-page-content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #0d6efd;
      margin: 0 0 1rem 0;
      letter-spacing: 2px;
      text-shadow: none !important;
    }

    .login-page-content>p {
      font-size: 1rem;
      color: #6c757d;
      margin: 0 0 2rem 0;
    }

    .login-form-card {
      background-color: #ffffff;
      border: 1px solid rgba(13, 110, 253, 0.4);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }

    .login-form-card h2 {
      font-size: 2.5rem;
      font-weight: 800;
      color: #0d6efd;
      margin: 0 0 2rem 0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .login-form-group {
      margin-bottom: 2rem;
      text-align: left;
    }

    .login-form-group label {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: #0d6efd;
      margin-bottom: 0.75rem;
    }

    .login-form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 0.95rem;
      background-color: #ffffff;
      color: #111;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-family: "Montserrat", sans-serif;
      transition: border-color 0.3s ease;
    }

    /* Password input wrapper to position toggle */
    .password-wrapper {
      position: relative;
    }

    /* provide space for the toggle button inside the input */
    .password-wrapper input[type="password"],
    .password-wrapper input[type="text"] {
      padding-right: 3.5rem;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #000;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      transition:
        background 0.15s ease,
        color 0.15s ease;
      padding: 0;
    }

    .toggle-password:hover {
      background: rgba(13, 110, 253, 0.08);
      color: #000;
    }

    .toggle-password svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: #000;
      fill: none;
    }

    /* default visibility via classes to avoid overlap flicker */
    .toggle-password .eye-open {
      display: block;
    }

    .toggle-password .eye-closed {
      display: none;
    }

    .toggle-password.show-closed .eye-open {
      display: none;
    }

    .toggle-password.show-closed .eye-closed {
      display: block;
    }

    .login-form-group input:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.1);
    }

    .login-form-group input::placeholder {
      color: #9ca3af;
    }

    .login-error-message {
      color: #e74c3c;
      background-color: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      text-align: center;
    }

    .login-btn {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 700;
      background-color: #0d6efd;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-btn:hover:not(:disabled) {
      background-color: #0d6efd;
      box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
    }

    .login-btn:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .login-btn-spinner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .spinner {
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: #000;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* DASHBOARD STYLES */
    .dashboard-wrapper {
      display: none;
      min-height: 100vh;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .dashboard-wrapper.active {
      display: block;
    }

    .dashboard-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .dashboard-logo {
      width: 200px;
      margin-bottom: 20px;
      filter: drop-(0 0 18px rgba(13, 110, 253, 0.7));
    }

    .dashboard-header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #0d6efd;
      text-shadow: none !important;
    }

    .dashboard-header p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      opacity: 0.85;
      color: #111;
    }

    .view-prompt-btn {
      color: #0d6efd;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      margin-left: 8px;
    }

    .logout-btn {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      padding: 10px 24px;
      border-radius: 30px;
      color: #111;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 18px rgba(231, 76, 60, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    .logout-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 28px rgba(231, 76, 60, 0.8);
    }

    .editors-access-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 20;
    }

    .editors-access-btn {
      background: linear-gradient(135deg, #0d6efd, #1ab2ff);
      padding: 10px 24px;
      border-radius: 30px;
      color: #000;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 18px rgba(13, 110, 253, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    .editors-access-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 28px rgba(13, 110, 253, 0.8);
    }

    .btn-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(3, 1fr);
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* CHANGED: New wrapper for each button to contain popup */
    .dashboard-btn-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .dashboard-btn {
      background: linear-gradient(135deg, #0d6efd, #1ab2ff);
      padding: 20px 30px;
      border-radius: 12px;
      color: #000;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(13, 110, 253, 0.4);
      transition: all 0.3s ease;
      border: 2px solid rgba(13, 110, 253, 0.6);
      text-align: center;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
    }

    .dashboard-btn:hover {
      transform: translateY(-6px);
      box-shadow: 0 6px 32px rgba(13, 110, 253, 0.8);
      background: linear-gradient(135deg, #80dfff, #33ccff);
    }

    /* CHANGED: Remove old hidden buttons container styles */
    /* Hidden buttons that appear on hover */
    /* .hidden-btns-container {
      position: relative;
      grid-column: span 3;
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(3, 1fr);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.4s ease;
      opacity: 0;
    }

    .btn-grid:hover .hidden-btns-container {
      max-height: 200px;
      opacity: 1;
    } */

    /* CHANGED: New popup styles for individual tool popups */
    .tool-popup {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 0px;
      background: rgba(255, 255, 255, 0.98);
      border: 2px solid rgba(13, 110, 253, 0.4);
      border-radius: 8px;
      padding: 8px;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 0.3s ease,
        visibility 0.3s ease,
        transform 0.3s ease;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* CHANGED: Show popup on wrapper hover */
    .dashboard-btn-wrapper:hover .tool-popup {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    /* CHANGED: Prevent popup from closing when hovering over it */
    .tool-popup:hover {
      opacity: 1;
      visibility: visible;
    }

    /* CHANGED: Styles for popup buttons */
    .popup-btn {
      background: rgba(13, 110, 253, 0.15);
      color: #0d6efd;
      border: 1px solid rgba(13, 110, 253, 0.3);
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      font-family: "Montserrat", sans-serif;
    }

    .popup-btn:hover {
      background: rgba(13, 110, 253, 0.3);
      border-color: rgba(13, 110, 253, 0.6);
      transform: translateX(4px);
    }

    /* Modal for displaying API data */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(13, 110, 253, 0.3);
      border-radius: 16px;
      padding: 32px;
      max-width: 100%;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(13, 110, 253, 0.3);
      padding-bottom: 16px;
    }

    .modal-header h2 {
      color: #0d6efd;
      font-size: 24px;
      font-weight: 700;
      margin: 0;
    }

    .modal-close-btn {
      background: none;
      border: none;
      color: #0d6efd;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.3s;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .modal-close-btn:hover {
      color: #0d6efd;
      transform: scale(1.2);
    }

    .modal-body {
      color: #111;
      font-size: 14px;
      line-height: 1.6;
    }

    .modal-loading {
      text-align: center;
      padding: 40px;
      color: #0d6efd;
    }

    .modal-loading .spinner {
      width: 40px;
      height: 40px;
      border-width: 4px;
      border-color: rgba(13, 110, 253, 0.3);
      border-top-color: #0d6efd;
      margin: 0 auto 20px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .data-table th,
    .data-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(13, 110, 253, 0.2);
    }

    .data-table th {
      background: rgba(13, 110, 253, 0.2);
      color: #0d6efd;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .data-table tr:hover {
      background: rgba(13, 110, 253, 0.05);
    }

    .data-item {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #dee2e6;
    }

    .data-item strong {
      color: #0d6efd;
      display: inline-block;
      min-width: 150px;
    }

    @media (max-width: 991px) {
      .btn-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      /* CHANGED: Remove old hidden container responsive styles */
      /* .hidden-btns-container {
        grid-column: span 2;
      } */

      .dashboard-header h1 {
        font-size: 2.5rem;
      }

      /* CHANGED: Adjust popup positioning for smaller screens */
      .tool-popup {
        min-width: 180px;
      }
    }

    @media (max-width: 767px) {
      .editors-access-container {
        position: static;
        margin-top: 10px;
        margin-bottom: 20px;
      }

      .btn-grid {
        grid-template-columns: 1fr;
      }

      /* CHANGED: Remove old hidden container responsive styles */
      /* .hidden-btns-container {
        grid-column: span 1;
      } */

      .dashboard-header h1 {
        font-size: 2rem;
      }

      .dashboard-header p {
        font-size: 1rem;
      }

      .dashboard-btn {
        min-height: 60px;
        font-size: 1rem;
        padding: 16px 20px;
      }

      .modal-content {
        padding: 20px;
      }

      .modal-header h2 {
        font-size: 20px;
      }

      /* CHANGED: Full width popup on mobile */
      .tool-popup {
        left: 0;
        right: 0;
        transform: none;
        margin-left: 0;
        margin-right: 0;
        min-width: auto;
      }

      .dashboard-btn-wrapper:hover .tool-popup {
        transform: none;
      }
    }
  </style>
</head>

<body>
  
  

  <!-- LOGIN PAGE -->
  <div class="login-page-wrapper" id="login-page">
    <div class="login-page-content">
      <div class="login-logo-section">
        <img src="/Designer.png" alt="Zane & west Law and Firms Logo" />
        <h1>Zane & west Law and Firms Admin Panel</h1>
        <div class="editors-access-container">
          <button class="editors-access-btn" onclick="window.location.href='/editorpanel'">Editors Access</button>
        </div>
        <p>Secure Admin Access</p>
      </div>

      <div class="login-form-card">
        <h2>Login</h2>

        <form onsubmit="handleLogin(event)">
          <!-- Email Input -->
          <div class="login-form-group">
            <label for="admin-email">Email</label>
            <input id="admin-email" type="email" placeholder="Enter your admin email" required />
          </div>

          <!-- Password Input -->
          <div class="login-form-group">
            <label for="admin-password">Password</label>
            <div class="password-wrapper">
              <input id="admin-password" type="password" placeholder="Enter your password" required />
              <button type="button" class="toggle-password" aria-label="Show password" title="Show password">
                <!-- Eye (open) -->
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <!-- Eye (closed) -->
                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.86 21.86 0 0 1 5.06-6.06" />
                  <path d="M1 1l22 22" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Error Message -->
          <div id="login-error" class="login-error-message" style="display: none"></div>

          <!-- Login Button -->
          <button type="submit" id="login-btn" class="login-btn">
            <span id="login-btn-text">Login</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard-wrapper" id="dashboard">
    <div class="dashboard-header">
      <img src="/Designer.png" class="dashboard-logo" alt="Zane & west Law and Firms Logo" />
      <h1>Zane & west Law and Firms Admin Panel</h1>
      <p id="admin-welcome">Welcome, Admin</p>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
      <div style="width:100%; display:flex; justify-content:center;">
        <div class="dashboard-btn-wrapper" style="margin-top:16px; display:inline-block;">
          <button class="dashboard-btn" data-tool="whitelist_files">Whitelist Files</button>
          <div class="tool-popup">
            <button class="popup-btn" onclick="showModal('whitelist-view', 'Whitelist')">View</button>
            <button class="popup-btn" onclick="showModal('whitelist-edit', 'Whitelist')">Edit</button>
          </div>
        </div>
      </div>
    </div>

    <div class="btn-grid">
      <!-- CHANGED: Each main button now has its own popup with data-tool attribute -->
      <!-- Main 9 Buttons with individual hover popups -->
      <div class="dashboard-btn-wrapper">
        <button class="dashboard-btn" data-tool="casevalue">CaseValue</button>
        <!-- CHANGED: Individual popup for CaseValue ,This three button below are commented for now -->

        <div class="tool-popup">
          <button class="popup-btn" onclick="showModal('error-logs', 'casevalue')">
            Error Logs
          </button>
          <button class="popup-btn" onclick="showModal('active-today', 'casevalue')">
            Active Session
          </button>
          <button class="popup-btn" onclick="showModal('prompt-logs', 'casevalue')">
            Prompt Logs
          </button>
        </div>
      </div>

      <div class="dashboard-btn-wrapper">
        <button class="dashboard-btn" data-tool="document_summary">
          Document Summary Generator
        </button>
        <!-- CHANGED: Individual popup for Document Summary -->
        <div class="tool-popup">
          <button class="popup-btn" onclick="showModal('error-logs', 'Medical_Summary_Generator')">
            Error Logs
          </button>
          <button class="popup-btn" onclick="showModal('active-today', 'Medical_Summary_Generator')">
            Active Session
          </button>
          <button class="popup-btn" onclick="showModal('prompt-logs', 'Medical_Summary_Generator')">
            Prompt Logs
          </button>
        </div>
      </div>

      <div class="dashboard-btn-wrapper">
        <button class="dashboard-btn" data-tool="email2ai">
          Email2Ai
        </button>
        <!-- Individual popup for Email 2 Ai -->

        <div class="tool-popup">
          <button class="popup-btn" onclick="showModal('error-logs', 'email2ai')">
            Error Logs
          </button>
          <button class="popup-btn" onclick="showModal('prompt-logs', 'email2ai')">
            Prompt Logs
          </button>
        </div>
      </div>

      <div class="dashboard-btn-wrapper">
        <button class="dashboard-btn" data-tool="vicp_attorney_fees">
          VICP Attorney Fees
        </button>
        <!-- CHANGED: Individual popup for VICP Attorney Fees -->
        <div class="tool-popup">
          <button class="popup-btn" onclick="showModal('error-logs', 'VICP_Attorney_Fees')">
            Error Logs
          </button>
          <button class="popup-btn" onclick="showModal('active-today', 'VICP_Attorney_Fees')">
            Active Session
          </button>
          <button class="popup-btn" onclick="showModal('prompt-logs', 'VICP_Attorney_Fees')">
            Prompt Logs
          </button>
        </div>
      </div>

      <div class="dashboard-btn-wrapper">
        <button class="dashboard-btn" data-tool="settlement_optimizer">
          Settlement Optimizer
        </button>
        <!-- CHANGED: Individual popup for Settlement Optimizer -->
        <div class="tool-popup">
          <button class="popup-btn" onclick="showModal('error-logs', 'Settlement_Predictor')">
            Error Logs
          </button>

          <button class="popup-btn" onclick="showModal('active-today', 'Settlement_Predictor')">
            Active Session
          </button>
          <button class="popup-btn" onclick="showModal('prompt-logs', 'Settlement_Predictor')">
            Prompt Logs
          </button>
        </div>
      </div>

      <div class="dashboard-btn-wrapper">
        <button class="dashboard-btn" data-tool="injury_intelligence">
          Injury Intelligence:Vision
        </button>
        <!-- CHANGED: Individual popup for Injury Intelligence -->
        <div class="tool-popup">
          <button class="popup-btn" onclick="showModal('error-logs', 'Injury_Intelligence')">
            Error Logs
          </button>

          <button class="popup-btn" onclick="showModal('active-today', 'Injury_Intelligence')">

      if (token && adminEmail) {
        showDashboard(adminEmail);
      }
    });

    // Handle login form submission
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById("admin-email").value.trim();
      const password = document.getElementById("admin-password").value;
      const loginBtn = document.getElementById("login-btn");
      const loginBtnText = document.getElementById("login-btn-text");
      const errorDiv = document.getElementById("login-error");

      // Disable button and show loading
      loginBtn.disabled = true;
      loginBtnText.innerHTML =
        '<span class="login-btn-spinner"><span class="spinner"></span>Logging in...</span>';
      errorDiv.style.display = "none";

      try {
        // Call your login API - using email and password as per your curl
        const formData = new URLSearchParams();
        formData.append("email", email);
        formData.append("password", password);

        const response = await fetch(`${API_BASE_URL}/admin/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "ngrok-skip-browser-warning": "true",
          },
          body: formData,
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(
            errorData.detail ||
            errorData.message ||
            `Login failed with status ${response.status}`,
          );
        }

        const data = await response.json();

        if (data.access_token) {
          // Store token and email
          localStorage.setItem("adminToken", data.access_token);
          localStorage.setItem("adminEmail", email);

          // Show dashboard
          showDashboard(email);
        } else {
          throw new Error("No access token received");
        }
      } catch (error) {
        // Show error message
        errorDiv.textContent =
          error.message || "Login failed. Please try again.";
        errorDiv.style.display = "block";

        // Re-enable button
        loginBtn.disabled = false;
        loginBtnText.textContent = "Login";
      }
    }

      document.getElementById("admin-welcome").textContent =

    // Toggle between short and full prompt text when user clicks the button
    function togglePrompt(button) {
      try {
        const container = button.closest(".data-item");
        if (!container) return;
        const shortEl = container.querySelector(".short-prompt");
        const fullEl = container.querySelector(".full-prompt");
        if (!shortEl || !fullEl) return;

        const isHidden = shortEl.style.display === "none";
        if (isHidden) {
          // currently showing full, switch to short
          shortEl.style.display = "";
          fullEl.style.display = "none";
          button.textContent = "View full prompt";
        } else {
          // show full
          shortEl.style.display = "none";
          fullEl.style.display = "";
          button.textContent = "View less";
        }
      } catch (e) {
        console.error("togglePrompt error", e);
      }
    }

    // Simple escape to avoid breaking HTML when inserting prompt text
    function escapeHtml(str) {
      if (typeof str !== "string") return str;
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    // Format object keys for display
    function formatKey(key) {
      return key
        .split("_")
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    // Handle Playbook file upload
    async function handlePlaybookUpload() {
      const fileInput = document.getElementById("playbook-file-input");
      const departmentInput = document.getElementById(
        "playbook-department-input",
      );
      const uploadBtn = document.getElementById("playbook-upload-btn");
      const uploadMessage = document.getElementById(
        "playbook-upload-message",
      );

      const file = fileInput.files[0];
      const department = departmentInput.value.trim();

      // Validation - file is required
      if (!file) {
        uploadMessage.style.display = "block";
        uploadMessage.style.color = "#e74c3c";
        uploadMessage.textContent = "Please select a file";
        return;
      }

      try {
        // Disable button and show loading
        uploadBtn.disabled = true;
        uploadBtn.textContent = "Uploading...";
        uploadMessage.style.display = "none";

        // Create FormData
        const formData = new FormData();
        formData.append("file", file);
        if (department) {
          formData.append("department", department);
        }

        // Get auth token
        const token = localStorage.getItem("adminToken");
        if (!token) {
          throw new Error("Not authenticated. Please login again.");
        }

        // Call upload API
        const response = await fetch(
          `${API_BASE_URL}/admin/Playbook_Chatbot/upload`,
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "ngrok-skip-browser-warning": "true",
            },
            body: formData,
          },
        );

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(
            errorData.detail || errorData.message || "Upload failed",
          );
        }

        const data = await response.json();

        // Check if response has indexed status or file already exists
        if (
          data.result &&
          (data.result.status === "indexed" ||
            data.result.status.includes("file is already present"))
        ) {
          // Store the uploaded file and department for regenerate
          lastPlaybookUploadedFile = file;
          lastPlaybookUploadedDepartment = department;

          // Show the status message (either indexed or file already present)
          uploadMessage.style.display = "block";
          uploadMessage.style.color = "#0d6efd";
          uploadMessage.textContent = data.result.status;

          // Change button to Regenerate
          uploadBtn.disabled = false;
          uploadBtn.textContent = "Regenerate";
          uploadBtn.onclick = handlePlaybookRegenerate;

          // Disable file and department inputs
          fileInput.disabled = true;
          departmentInput.disabled = true;
        } else {
          // Success message for other responses
          uploadMessage.style.display = "block";
          uploadMessage.style.color = "#2ecc71";
          uploadMessage.textContent = "âœ“ File uploaded successfully!";

          // Reset form after 2 seconds
          setTimeout(() => {
            fileInput.value = "";
            departmentInput.value = "";
            uploadMessage.style.display = "none";
            uploadBtn.disabled = false;
            uploadBtn.textContent = "Upload";
            uploadBtn.onclick = handlePlaybookUpload;
            fileInput.disabled = false;
            departmentInput.disabled = false;
          }, 2000);
        }

      } catch (error) {
        uploadMessage.style.display = "block";
        uploadMessage.style.color = "#e74c3c";
        uploadMessage.textContent = `Error: ${error.message}`;

        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload";
        uploadBtn.onclick = handlePlaybookUpload;
      }
    }

    // Handle Playbook file regenerate
    async function handlePlaybookRegenerate() {
      const fileInput = document.getElementById("playbook-file-input");
      const departmentInput = document.getElementById(
        "playbook-department-input",
      );
      const uploadBtn = document.getElementById("playbook-upload-btn");
      const uploadMessage = document.getElementById(
        "playbook-upload-message",
      );

      if (!lastPlaybookUploadedFile) {
        uploadMessage.style.display = "block";
        uploadMessage.style.color = "#e74c3c";
        uploadMessage.textContent = "No file to regenerate";
        return;
      }

      try {
        // Disable button and show loading
        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<span class="login-btn-spinner"><span class="spinner"></span>Regenerating...</span>';
        uploadMessage.style.display = "none";

        // Enable file and department inputs during regenerate
        fileInput.disabled = true;
        departmentInput.disabled = false;

        // Create FormData
        const formData = new FormData();
        formData.append("file", lastPlaybookUploadedFile);
        if (lastPlaybookUploadedDepartment) {
          formData.append("department", lastPlaybookUploadedDepartment);
        }

        // Get auth token
        const token = localStorage.getItem("adminToken");
        if (!token) {
          throw new Error("Not authenticated. Please login again.");
        }

        // Call regenerate API with ?regenerate=true
        const response = await fetch(`${API_BASE_URL}/admin/Playbook_Chatbot/upload?regenerate=true`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${token}`,
            "ngrok-skip-browser-warning": "true",
          },
          body: formData,
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || errorData.message || "Regenerate failed");
        }

        const data = await response.json();

        // Success message
        uploadMessage.style.display = "block";
        uploadMessage.style.color = "#2ecc71";
        uploadMessage.textContent = "âœ“ File regenerated successfully!";

        // Reset to Upload state
        lastPlaybookUploadedFile = null;
        lastPlaybookUploadedDepartment = null;

        // Enable inputs
        fileInput.disabled = false;
        departmentInput.disabled = false;

        // Clear inputs
        fileInput.value = "";
        departmentInput.value = "";

        // Reset button
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload";
        uploadBtn.onclick = handlePlaybookUpload;

      } catch (error) {
        uploadMessage.style.display = "block";
        uploadMessage.style.color = "#e74c3c";
        uploadMessage.textContent = `Error: ${error.message}`;

        uploadBtn.disabled = false;
        uploadBtn.textContent = "Regenerate";
      }
    }

            <div style="margin-bottom: 16px;">
              <label style="display:block; color:#0d6efd; margin-bottom:6px; font-size:13px;">Email</label>
              <input id="spec-email" type="email" placeholder="email@zanewestlaw.com" style="width:100%; padding:10px; border-radius: 0; background:rgba(0,0,0,0.6); border:1px solid rgba(241,196,15,0.2); color:#fff; font-family:'Montserrat',sans-serif;" />
            </div>
            <div style="margin-bottom: 16px;">
              <label style="display:block; color:#0d6efd; margin-bottom:6px; font-size:13px;">Position</label>
              <input id="spec-position" type="number" placeholder="1" style="width:100%; padding:10px; border-radius: 0; background:rgba(0,0,0,0.6); border:1px solid rgba(241,196,15,0.2); color:#fff; font-family:'Montserrat',sans-serif;" />
            </div>
            <div id="spec-result" style="margin-bottom:12px; font-size:14px;"></div>
            <button onclick="handleSpecialistSubmit('single')" id="spec-submit-btn" style="width:100%; padding:12px; background: linear-gradient(135deg, #0d6efd, #1ab2ff); color: #000; border: none; border-radius: 0; font-weight:700; cursor:pointer; font-family:'Montserrat',sans-serif;">Add Specialist</button>
            <button onclick="showSpecialistChoice()" style="width:100%; margin-top: 12px; padding: 8px; background: transparent; color: #6c757d; border: none; cursor: pointer; font-size: 13px;">&larr; Back to Choice</button>
          `;
      } else {
        formContainer.innerHTML = `
            <div id="bulk-rows-container">
              <!-- Rows will be added here -->
            </div>
            <button onclick="addSpecialistRow()" style="width:100%; margin-bottom: 20px; padding: 10px; background: rgba(13, 110, 253, 0.1); color: #0d6efd; border: 1px dashed #0d6efd; border-radius: 0; cursor: pointer; font-weight: 600; font-family:'Montserrat',sans-serif;">+ Add Another Specialist</button>
            <div id="spec-result" style="margin-bottom:12px; font-size:14px;"></div>
            <button onclick="handleSpecialistSubmit('bulk')" id="spec-submit-btn" style="width:100%; padding:12px; background: linear-gradient(135deg, #0d6efd, #1ab2ff); color: #000; border: none; border-radius: 0; font-weight:700; cursor:pointer; font-family:'Montserrat',sans-serif;">Submit All Specialists</button>
            <button onclick="showSpecialistChoice()" style="width:100%; margin-top: 12px; padding: 8px; background: transparent; color: #6c757d; border: none; cursor: pointer; font-size: 13px;">&larr; Back to Choice</button>
          `;
        // Add first row automatically
        addSpecialistRow();
      }
    }

    function addSpecialistRow() {
      const container = document.getElementById("bulk-rows-container");
      if (!container) return;

      const rowId = Date.now() + Math.random();
      const row = document.createElement("div");
      row.className = "bulk-row";
      row.id = `row-${rowId}`;
      row.style.cssText =
        "background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(13, 110, 253, 0.1); position: relative;";

      row.innerHTML = `
          <button onclick="removeSpecialistRow('${rowId}')" style="position: absolute; top: 8px; right: 8px; background: transparent; color: #e74c3c; border: none; cursor: pointer; font-size: 20px; line-height: 1; padding: 0;">&times;</button>
          <div style="display: grid; grid-template-columns: 1fr 1fr 80px; gap: 10px; margin-top: 10px;">
            <div>
              <label style="display:block; color:#0d6efd; margin-bottom:4px; font-size:11px;">Practice Area</label>
              <input type="text" class="spec-practice-area-bulk" placeholder="MVA" style="width:100%; padding:8px; border-radius: 0; background:rgba(0,0,0,0.6); border:1px solid rgba(241,196,15,0.2); color:#fff; font-size:13px; font-family:'Montserrat',sans-serif;" />
            </div>
            <div>
              <label style="display:block; color:#0d6efd; margin-bottom:4px; font-size:11px;">Email</label>
              <input type="email" class="spec-email-bulk" placeholder="email@zanewestlaw.com" style="width:100%; padding:8px; border-radius: 0; background:rgba(0,0,0,0.6); border:1px solid rgba(241,196,15,0.2); color:#fff; font-size:13px; font-family:'Montserrat',sans-serif;" />
            </div>
            <div>
              <label style="display:block; color:#0d6efd; margin-bottom:4px; font-size:11px;">Pos</label>
              <input type="number" class="spec-position-bulk" placeholder="1" style="width:100%; padding:8px; border-radius: 0; background:rgba(0,0,0,0.6); border:1px solid rgba(241,196,15,0.2); color:#fff; font-size:13px; font-family:'Montserrat',sans-serif;" />
            </div>
          </div>
        `;
      container.appendChild(row);
    }

    function removeSpecialistRow(id) {
      const row = document.getElementById(`row-${id}`);
      if (row) row.remove();
    }

    function showSpecialistChoice() {
      document.getElementById("specialist-choice-screen").style.display =
        "block";
      document.getElementById("specialist-form-container").style.display =
        "none";
    }

    async function handleSpecialistSubmit(mode) {
      const resultDiv = document.getElementById("spec-result");
      const submitBtn = document.getElementById("spec-submit-btn");
      resultDiv.innerHTML = "";

      let body = null;
      let endpoint =
        mode === "bulk"
          ? "/admin/intakeops/intake_specialists/bulk"
          : "/admin/intakeops/intake_specialists";

      if (mode === "single") {
        const practice_area = document
          .getElementById("spec-practice-area")
          .value.trim();
        const email = document.getElementById("spec-email").value.trim();
        const position = parseInt(
          document.getElementById("spec-position").value,
        );

        if (!practice_area || !email || isNaN(position)) {
          resultDiv.innerHTML =
            '<div class="data-item" style="color:#e74c3c;">All fields are required</div>';
          return;
        }
        body = JSON.stringify({ practice_area, email, position });
      } else {
        const rows = document.querySelectorAll(".bulk-row");
        const specialists = [];
        let hasError = false;

        rows.forEach((row) => {
          const practice_area = row
            .querySelector(".spec-practice-area-bulk")
            .value.trim();
          const email = row.querySelector(".spec-email-bulk").value.trim();
          const positionInput = row.querySelector(".spec-position-bulk");
          const position = parseInt(positionInput.value);

          if (!practice_area || !email || isNaN(position)) {
            hasError = true;
            row.style.borderColor = "#e74c3c";
            row.style.background = "rgba(231, 76, 60, 0.05)";
          } else {
            row.style.borderColor = "rgba(13, 110, 253, 0.1)";
            row.style.background = "rgba(13, 110, 253, 0.05)";
            specialists.push({ practice_area, email, position });
          }
        });

        if (hasError) {
          resultDiv.innerHTML =
            '<div class="data-item" style="color:#e74c3c;">Please fill all fields for each row</div>';
          return;
        }

        if (specialists.length === 0) {
          resultDiv.innerHTML =
            '<div class="data-item" style="color:#e74c3c;">Please add at least one specialist</div>';
          return;
        }

        body = JSON.stringify(specialists);
      }

      submitBtn.disabled = true;
      const prevText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="spinner"></span> Processing...';

      try {
        const response = await fetch(`${API_BASE_URL}${endpoint}`, {
          method: "POST",
          headers: getAuthHeaders(),
          body: body,
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.detail || data.message || "Request failed");
        }

        resultDiv.innerHTML = `<div class="data-item" style="color:#2ecc71;">âœ“ ${escapeHtml(data.message || "Success!")}</div>`;
        // Close modal after a short delay to let user see the success message
        setTimeout(() => {
          document.getElementById("data-modal").classList.remove("active");
        }, 1200);
      } catch (err) {
        resultDiv.innerHTML = `<div class="data-item" style="color:#e74c3c;">${escapeHtml(err.message || "Something went wrong")}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = prevText;
      }
    }

    // Run on load to wire up toggles (safe to have multiple DOMContentLoaded listeners)
    window.addEventListener("DOMContentLoaded", function () {
      initPasswordToggles();
    });
  </script>
</body>

</html>
