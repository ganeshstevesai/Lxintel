<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaseValue</title>
    <link rel="icon" type="image/webp" href="/Designer.png" />
    <link rel="stylesheet" href="index.css" />
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: { fontFamily: { sans: ["Montserrat", "system-ui"] } },
        },
      };
    </script>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  </head>

  <body class="min-h-screen p-4 text-[#111]">
    
    

    <!-- LOGIN PAGE CONTAINER -->
    <div
      class="w-full max-w-[40rem] relative z-10 mx-auto mt-10 md:mt-20"
      x-data="loginApp()"
      x-show="!loggedIn"
    >
      <!-- HEADER WITH LOGO AND TITLE -->
      <div class="header-text">
        <img src="/Designer.png" alt="ValuetTab" />
        <h1>Value Tab</h1>
        <p>Secure Access for Authorized Users</p>
      </div>

      <!-- LOGIN FORM -->
      <div class="dark-theme-card p-6 space-y-5">
        <h2
          class="text-[36px] font-extrabold uppercase tracking-[0.5px] text-center text-[#0d6efd] mt-0 mb-0"
        >
          Login
        </h2>

        <!-- Email Input -->
        <div>
          <label class="block text-[#0d6efd] font-semibold mb-2">Email</label>
          <input
            type="email"
            placeholder="Enter your email"
            x-model="email"
            @input.debounce.500="verifyEmail()"
            @keydown.enter="emailValid && login()"
            class="w-full p-3 dark-theme-input font-medium text-[15px] leading-[28px]"
          />

          <!-- Email Status -->
          <div
            class="email-status"
            :class="email && email.includes('@') ? 'visible' : ''"
            x-show="email && email.includes('@')"
          >
            <span
              class="status-icon"
              :class="emailChecking ? 'checking' : emailValid ? 'valid' : 'invalid'"
            ></span>
            <span class="status-text">
              <span x-show="emailChecking">Checking email...</span>
              <span x-show="!emailChecking && emailValid" style="color: #111111"
                >Email authorized</span
              >
              <span
                x-show="!emailChecking && !emailValid"
                style="color: #111111"
                >Email not authorized</span
              >
            </span>
          </div>
        </div>

        <!-- Error Message - Above Login Button -->
        <p x-show="error" x-text="error" class="error-message"></p>

        <!-- Login Button - Always visible, disabled until email is verified -->
        <button
          @click="login()"
          :disabled="!emailValid || !email"
          class="w-full py-3 font-medium transition"
          :class="emailValid && email ? 'dark-theme-btn-primary' : 'opacity-50 cursor-not-allowed dark-theme-btn-primary'"
        >
          <span x-show="!loggingIn">Login</span>
          <span x-show="loggingIn" class="flex items-center justify-center">
            <span
              class="spinner"
              style="
                width: 14px;
                height: 14px;
                border-width: 2px;
                margin-left: 0;
              "
            ></span>
            Logging in...
          </span>
        </button>
      </div>
    </div>

    <!-- UPLOAD PAGE CONTAINER -->
    <div
      class="w-full max-w-[60rem] relative z-10 mx-auto mt-24 pb-12"
      x-data="caseApp()"
      x-show="isLoggedIn"
    >
      <!-- HEADER BAR -->
      <div class="header-bar">
        <div class="flex justify-between items-center header_bar_top">
          <div
            style="display: flex; align-items: center; gap: 15px"
            class="top_logo_area_main"
          >
            <img
              src="/Designer.png"
              alt="ValuetTab"
              style="width: 50px; height: auto"
            />
            <h2
              class="mb-0 text-[#0d6efd]"
              style="font-size: 20px; font-weight: 600"
            >
              Billing Summary Generator
            </h2>
            <!-- ACTIVE USERS BUTTON -->
            <button
              id="active-users-btn"
              onclick="toggleActiveUsers()"
              class="flex items-center gap-2 text-xs font-semibold px-2 py-1 rounded hover:bg-cyan-500/10"
              title="Active users"
            >
              <span class="w-2 h-2 bg-green-500 rounded-none "></span>
              <span id="active-user-count">0</span>
              Active Users
            </button>
            <!-- Active Users Popover -->
            <div
              id="active-users-popover"
              class="active_user active_user_popover_style"
              style="display: none"
            >
              <div
                style="
                  padding: 8px 0;
                  margin-bottom: 8px;
                  border-bottom: 1px solid rgba(17, 17, 17, 0.3);
                  color: #0d6efd;
                  font-size: 12px;
                  font-weight: 600;
                "
              >
                Active Users
              </div>
              <div id="active-users-list"></div>
            </div>
          </div>
          <div
            style="display: flex; align-items: center; gap: 20px"
            class="top_header_space"
          >
            <div style="text-align: right; font-size: 0.9rem; color: #6c757d">
              <span
                style="display: block; color: #0d6efd; font-weight: 600"
                x-text="userEmail"
                class="heading_top_mail"
              ></span>
              <span style="font-size: 0.85rem">Logged in</span>
            </div>
            <div class="menu-container" x-data="{ menuOpen: false }">
              <button class="menu-button" @click="menuOpen = !menuOpen">
                ⋮
              </button>
              <div
                class="menu-popover"
                x-show="menuOpen"
                @click.outside="menuOpen = false"
              >
                <button @click="logout()">Logout</button>
              </div>
            </div>
            <button
              x-show="status === 'completed'"
              @click="reset()"
              class="dark-theme-btn-primary px-4 py-2 text-sm"
            >
              New Case
            </button>
          </div>
        </div>
      </div>

      <div class="p-8 max-w-3xl mx-auto space-y-8">
        <!-- CASE NUMBER INPUT -->
        <template x-if="!caseNumber && status !== 'completed'">
          <div class="dark-theme-card p-10 rounded-none text-center space-y-8">
            <div>
              <h3 class="text-3xl font-bold text-[#0d6efd] mb-4">
                Enter Case Number
              </h3>
            </div>
            <div class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
              <input
                type="text"
                placeholder="e.g. 268315"
                x-model="inputCaseNumber"
                @keyup.enter="startProcessing()"
                class="flex-1 px-4 py-3 text-base font-medium text-[#111] bg-white border border-gray-600 rounded-none focus:border-cyan-500 focus:outline-none transition placeholder-gray-500"
              />

              <button
                @click="startProcessing()"
                :disabled="!inputCaseNumber.trim() || loading"
                class="px-6 py-3 text-base font-bold rounded-none transition flex items-center justify-center gap-2 min-w-[140px]"
                :class="inputCaseNumber.trim() && !loading 
                      ? 'dark-theme-btn-primary ' 
                      : 'bg-gray-700 text-gray-500 cursor-not-allowed'"
              >
                <span x-show="!loading">START</span>

                <span x-show="loading" class="flex items-center gap-2">
                  <span class="spinner"></span>
                  Starting...
                </span>
              </button>
            </div>
          </div>
        </template>

        <!-- PROCESSING STATUS -->
        <template
          x-if="caseNumber && status !== 'completed' && status !== 'failed'"
        >
          <div class="dark-theme-card p-8 rounded-none space-y-6">
            <div class="text-center">
              <p class="text-gray-400">Case Number</p>
              <p
                class="text-3xl font-mono font-bold text-[#0d6efd]"
                x-text="caseNumber"
              ></p>
            </div>

            <div class="space-y-4">
              <div class="flex justify-between text-sm">
                <span style="color: #111111">Status</span>
                <span
                  x-text="status === 'processing' ? 'Processing...' : 'Waiting for result...'"
                ></span>
              </div>
              <div class="w-full bg-gray-800 rounded-none h-4 overflow-hidden">
                <div
                  class="bg-[#0d6efd]   h-full rounded-none transition-all duration-1000"
                  :style="{ width: progress + '%' }"
                ></div>
              </div>
              <p class="text-center text-gray-400 text-sm">
                Fetching files from SharePoint and generating summary...
              </p>
            </div>
          </div>
        </template>

        <!-- ERROR STATE -->
        <template x-if="status === 'failed'">
          <div class="dark-theme-card p-8 rounded-none space-y-6">
            <div class="text-center">
              <p class="text-gray-400">Case Number</p>
              <p
                class="text-3xl font-mono font-bold text-[#0d6efd]"
                x-text="caseNumber"
              ></p>
            </div>

            <div class="error-box text-center">
              <h3 class="text-2xl font-bold mb-3">Processing Failed</h3>
              <p
                class="text-base whitespace-pre-line"
                x-text="errorMessage"
              ></p>
            </div>

            <div class="text-center">
              <button
                @click="reset()"
                class="dark-theme-btn-primary px-6 py-3 text-base font-medium rounded-none"
              >
                Try Another Case
              </button>
            </div>
          </div>
        </template>

        <!-- FINAL RESULT -->
        <template x-if="status === 'completed'">
          <div class="space-y-8">
            <div class="dark-theme-card p-8 text-center">
              <h3 class="text-4xl font-bold text-green-400 mb-2">
                Processing Complete!
              </h3>

              <p
                class="text-xl text-gray-300"
                x-text="`Case ${caseNumber} â€¢ Completed in ${duration}s`"
              ></p>
              <p
                class="text-xl text-gray-300"
                x-show="responseMessage"
                x-text="responseMessage"
              ></p>
            </div>

            <div class="dark-theme-card rounded-none overflow-hidden">
              <div
                class="border-b border-gray-700 px-8 py-5 flex justify-between items-center heading_billing_report"
                style="background-color: #0d6efd;"
              >
                <h3 class="text-xl font-bold text-white">Billing Report</h3>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <script>
      const API_BASE_URL = window.location.origin;
      // Shared state between login and upload
      const appState = {
        loggedIn: false,
        email: "",
      };

      // ============ AUTH GUARD HELPERS ============
      function requireToken() {
        const token = localStorage.getItem("casevalueToken");
        if (!token) {
          alert(
            "Your session has expired or you are not logged in. Please log in first.",
          );
          localStorage.removeItem("casevalueToken");
          localStorage.removeItem("casevalueEmail");
          window.dispatchEvent(new Event("logout-success"));
          location.reload();
          return null;
        }
        return token;
      }

      function handle401() {
        alert("Your session has expired. Please log in again.");
        localStorage.removeItem("casevalueToken");
        localStorage.removeItem("casevalueEmail");
        window.dispatchEvent(new Event("logout-success"));
        location.reload();
      }

      function loginApp() {
        return {
          email: "",
          emailValid: false,
          emailChecking: false,
          error: "",
          loggedIn: false,
          loggingIn: false,

          init() {
            // Check if already logged in
            const token = localStorage.getItem("casevalueToken");
            const savedEmail = localStorage.getItem("casevalueEmail");
            if (token && savedEmail) {
              this.loggedIn = true;
              appState.loggedIn = true;
              this.email = savedEmail;
              appState.email = savedEmail;
            }

            // Listen for logout success event
            window.addEventListener("logout-success", () => {
              this.loggedIn = false;
              this.email = "";
              this.emailValid = false;
              this.error = "";
            });
          },

          // Backend Email Verification
          verifyEmail() {
            if (!this.email.includes("@")) {
              this.emailValid = false;
              this.error = "";
              return;
            }

            this.emailChecking = true;
            this.error = "";
            fetch(
              `${API_BASE_URL}/casevalue/verify-email?email=${encodeURIComponent(this.email)}`,
              {
                headers: { "ngrok-skip-browser-warning": "true" },
              },
            )
              .then((res) => res.json())
              .then((json) => {
                this.emailValid = json.valid;
                this.emailChecking = false;
                if (!json.valid) {
                  this.error =
                    "Access denied: Your email is not on the authorized list.";
                }
              })
              .catch(() => {
                this.emailValid = false;
                this.emailChecking = false;
                this.error =
                  "Access denied: Your email is not on the authorized list.";
              });
          },

          // Login only after email is validated
          login() {
            if (!this.emailValid) {
              this.error = "Email not authorized";
              return;
            }

            if (!this.email || !this.email.includes("@")) {
              this.error = "Please enter a valid email";
              return;
            }

            this.loggingIn = true;

            const data = new URLSearchParams();
            data.append("username", this.email);
            data.append("password", "not-used-but-required"); // password ignored by backend

            fetch(`${API_BASE_URL}/casevalue/login`, {
              method: "POST",
              body: data,
              headers: { "ngrok-skip-browser-warning": "true" },
            })
              .then((res) => {
                if (!res.ok) throw new Error("Unauthorized email");
                return res.json();
              })
              .then((json) => {
                localStorage.setItem("casevalueToken", json.access_token);
                localStorage.setItem("casevalueEmail", this.email);
                this.loggedIn = true;
                appState.loggedIn = true;
                appState.email = this.email;
                this.error = "";
                this.loggingIn = false;

                // Trigger custom event to notify upload component
                window.dispatchEvent(new CustomEvent("login-success"));
              })
              .catch((err) => {
                this.error = err.message;
                this.loggingIn = false;
              });
          },

          logout() {
            localStorage.removeItem("casevalueToken");
            localStorage.removeItem("casevalueEmail");
            this.loggedIn = false;
            appState.loggedIn = false;
            this.email = "";
            appState.email = "";
            this.emailValid = false;
          },
        };
      }
    </script>

    <script>
      function toggleActiveUsers() {
        const popover = document.getElementById("active-users-popover");
        const isOpening = popover.style.display !== "block";
        if (isOpening) {
          loadActiveUsers();
        }
        popover.style.display = isOpening ? "block" : "none";
      }

      async function loadActiveUsers() {
        const token = requireToken();
        if (!token) return;
        try {
          const res = await fetch(`${API_BASE_URL}/casevalue/active-today`, {
            headers: {
              Authorization: token ? `Bearer ${token}` : "",
              "ngrok-skip-browser-warning": "true",
            },
          });
          if (res.status === 401 || res.status === 403) {
            handle401();
            return;
          }
          if (!res.ok) throw new Error("Failed to fetch active users");
          const data = await res.json();

          const users = Array.isArray(data) ? data : [];

          document.getElementById("active-user-count").innerText = users.length;

          const list = document.getElementById("active-users-list");
          list.innerHTML = "";

          if (users.length === 0) {
            list.innerHTML =
              "<p style='color:#aaa; font-size:13px'>No active users</p>";
            return;
          }

          users.forEach((user) => {
            const div = document.createElement("div");
            div.style.padding = "10px 8px";
            div.style.fontSize = "13px";
            div.style.borderBottom = "1px solid #333";
            div.style.display = "flex";
            div.style.justifyContent = "space-between";
            div.style.alignItems = "center";
            div.style.gap = "16px";

            const emailSpan = document.createElement("span");
            emailSpan.style.color = "#111111";
            emailSpan.style.fontWeight = "500";
            emailSpan.style.flex = "1";
            emailSpan.innerText = user.email;

            const timeSpan = document.createElement("span");
            timeSpan.style.color = "#aaa";
            timeSpan.style.fontSize = "12px";
            timeSpan.style.whiteSpace = "nowrap";
            timeSpan.style.flexShrink = "0";
            timeSpan.innerText = formatLastActive(user.last_active);

            div.appendChild(emailSpan);
            div.appendChild(timeSpan);
            list.appendChild(div);
          });
        } catch (err) {
          console.error("Active users fetch failed", err);
        }
      }

      function formatLastActive(dateStr) {
        try {
          const date = new Date(dateStr);
          const now = new Date();
          const diffMs = now - date;
          const diffMins = Math.floor(diffMs / 60000);
          const diffHours = Math.floor(diffMs / 3600000);
          const diffDays = Math.floor(diffMs / 86400000);

          if (diffMins < 1) return "just now";
          if (diffMins < 60) return `${diffMins}m ago`;
          if (diffHours < 24) return `${diffHours}h ago`;
          return `${diffDays}d ago`;
        } catch (e) {
          return "";
        }
      }

      window.addEventListener("login-success", () => {
        loadActiveUsers();
      });

      window.addEventListener("logout-success", () => {});
    </script>

    <script>
      function caseApp() {
        return {
          markdown: "",
          markdownRaw: "", // Store raw markdown for PDF conversion
          isLoggedIn: false,
          userEmail: "",
          inputCaseNumber: "",
          caseNumber: null,
          status: null,
          progress: 0,
          duration: 0,
          loading: false,
          pollInterval: null,
          startTime: 0,
          errorMessage: "",
          regenerateMessage: false,
          responseMessage: "",

          init() {
            // Load login state
            const token = localStorage.getItem("casevalueToken");
            const email = localStorage.getItem("casevalueEmail");
            if (token && email) {
              this.isLoggedIn = true;
              this.userEmail = email;
              loadActiveUsers();
            }

            window.addEventListener("login-success", () => {
              this.isLoggedIn = true;
              this.userEmail = localStorage.getItem("casevalueEmail");
            });
          },

          async startProcessing() {
            console.log("startProcessing case:", this.inputCaseNumber);
            if (this.loading || !this.inputCaseNumber.trim()) return;

            const token = requireToken();
            if (!token) return;

            this.caseNumber = this.inputCaseNumber.trim();
            this.loading = true;
            this.status = "processing";
            this.progress = 50;
            this.startTime = Date.now();
            this.errorMessage = "";

            try {
              const response = await fetch(
                `${API_BASE_URL}/casevalue/start-case`,
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    Authorization: token ? `Bearer ${token}` : "",
                    "ngrok-skip-browser-warning": "true",
                  },
                  body: JSON.stringify({ caseNumber: this.caseNumber }),
                },
              );

              if (response.status === 401 || response.status === 403) {
                handle401();
                return;
              }

              if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || "Failed to start case");
              }

              const json = await response.json();
              console.log("Start case response:", json);

              if (
                json.message &&
                json.message.includes("Summary retrieved from blob storage")
              ) {
                this.regenerateMessage = true;
                this.responseMessage = json.message;
              } else {
                this.regenerateMessage = false;
                this.responseMessage = json.message;
              }

              // Start polling backend
              this.startPolling();
            } catch (error) {
              console.error(error);
              this.loading = false;
              this.status = "failed";
              this.errorMessage =
                error.message || "An unexpected error occurred";
            }
          },

          async renegrate() {
            console.log("Regenerating case:", this.inputCaseNumber);
            if (this.loading || !this.inputCaseNumber.trim()) return;

            const token = requireToken();
            if (!token) return;

            this.caseNumber = this.inputCaseNumber.trim();
            this.loading = true;
            this.status = "processing";
            this.progress = 50;
            this.startTime = Date.now();
            this.errorMessage = "";

            try {
              const response = await fetch(
                `${API_BASE_URL}/casevalue/start-case`,
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    Authorization: token ? `Bearer ${token}` : "",
                    "ngrok-skip-browser-warning": "true",
                  },
                  body: JSON.stringify({
                    caseNumber: this.caseNumber,
                    regenerate: "true",
                  }),
                },
              );

              if (response.status === 401 || response.status === 403) {
                handle401();
                return;
              }

              if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || "Failed to start case");
              }

              this.regenerateMessage = false;
              this.responseMessage = "";

              // Start polling backend
              this.startPolling();
            } catch (error) {
              console.error(error);
              this.loading = false;
              this.status = "failed";
              this.errorMessage =
                error.message || "An unexpected error occurred";
            }
          },

          startPolling() {
            this.pollInterval = setInterval(async () => {
              try {
                const token = requireToken();
                if (!token) {
                  clearInterval(this.pollInterval);
                  return;
                }
                const res = await fetch(
                  `${API_BASE_URL}/casevalue/case-result/${this.caseNumber}`,
                  {
                    headers: {
                      Authorization: token ? `Bearer ${token}` : "",
                      "ngrok-skip-browser-warning": "true",
                    },
                  },
                );

                if (res.status === 401 || res.status === 403) {
                  clearInterval(this.pollInterval);
                  handle401();
                  return;
                }
                const data = await res.json();

                if (data.status === "failed") {
                  clearInterval(this.pollInterval);
                  this.status = "failed";
                  this.loading = false;
                  this.errorMessage = data.error || "Case not found";
                  return;
                }
                // Check for PDF status error
                if (data.pdf_status?.value) {
                  clearInterval(this.pollInterval);
                  this.status = "failed";
                  this.loading = false;
                  this.errorMessage = data.pdf_status.value;
                  return;
                }
                // Check for billing status error
                if (data.billing_status?.value) {
                  clearInterval(this.pollInterval);
                  this.status = "failed";
                  this.loading = false;
                  this.errorMessage = data.billing_status.value;
                  return;
                }

                // Update progress bar just for UI feels
                if (this.progress < 95) {
                  this.progress += Math.random() * 5;
                }

                // Check if processing completed successfully
                if (data.final_summary) {
                  clearInterval(this.pollInterval);
                  this.status = "completed";
                  this.markdownRaw = data.final_summary;
                  this.markdown = this.renderFinalSummary(data.final_summary);
                  this.loading = false;
                  this.progress = 100;
                  this.duration = Math.round(
                    (Date.now() - this.startTime) / 1000,
                  );
                }
              } catch (err) {
                console.error("Polling error:", err);
                clearInterval(this.pollInterval);
                this.status = "failed";
                this.loading = false;
                this.errorMessage =
                  "Failed to fetch case status. Please try again.";
              }
            }, 3000);
          },

          escapeHtml(value) {
            return (value || "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#39;");
          },

          renderFinalSummary(summaryText) {
            const lines = (summaryText || "").split(/\r?\n/);
            const meta = { date: "", client: "", caseNumber: "" };
            const contentLines = [];

              `  .billing-debits-header .col-reduction { flex: 0 0 24mm; text-align: right; }` +

              `  }` +
              `  .billing-debits-row .col-provider  { flex: 1; }` +
              `  .billing-debits-row .col-date      { flex: 0 0 22mm; text-align: right; }` +
              `  .billing-debits-row .col-total     { flex: 0 0 26mm; text-align: right; }` +
              `  .billing-debits-row .col-paid      { flex: 0 0 20mm; text-align: right; }` +
              `  .billing-debits-row .col-balance   { flex: 0 0 24mm; text-align: right; }` +
              `  .billing-debits-row .col-reduction { flex: 0 0 24mm; text-align: right; }` +
              `  .billing-debits-row .col-due       { flex: 0 0 20mm; text-align: right; }` +
              `  .billing-label {` +
              `    font-size: 10pt; font-weight: 700; margin-top: 4pt;` +
              `  }` +
              `  .billing-line {` +
              `    font-size: 10pt; margin-top: 2pt;` +
              `    white-space: pre-wrap; word-break: break-word;` +
              `  }` +

              `<\/body>` +
              `<\/html>`;

            // Open a hidden iframe, write the print document into it, then trigger print.
            const iframe = document.createElement("iframe");
            iframe.style.cssText = [
              "position:fixed",
              "top:-10000px",
              "left:-10000px",
              "width:210mm",
              "height:297mm",
              "border:none",
              "opacity:0",
              "pointer-events:none",
            ].join(";");
            document.body.appendChild(iframe);

            await new Promise((resolve) => {
              iframe.onload = resolve;
              iframe.contentDocument.open();
              iframe.contentDocument.write(printDoc);
              iframe.contentDocument.close();
            });

            // Wait for images inside the iframe to finish loading
            const imgs = Array.from(
              iframe.contentDocument.querySelectorAll("img"),
            );
            await Promise.all(
              imgs.map((img) =>
                img.complete
                  ? Promise.resolve()
                  : new Promise((res) => {
                      img.onload = res;
                      img.onerror = res;
                    }),
              ),
            );

            // Extra paint tick for layout settle
            await new Promise((res) => setTimeout(res, 300));

            // Trigger the browser's native Save as PDF dialog
            iframe.contentWindow.focus();
            iframe.contentWindow.print();

            // Clean up after a short delay (gives print dialog time to open)
            setTimeout(() => {
              try {
                document.body.removeChild(iframe);
              } catch (_) {}
            }, 2000);
          },

          reset() {
            this.inputCaseNumber = "";
            this.caseNumber = null;
            this.status = null;
            this.progress = 0;
            this.duration = 0;
            this.loading = false;
            this.errorMessage = "";
            this.markdown = "";
            this.markdownRaw = "";
            if (this.pollInterval) clearInterval(this.pollInterval);
          },

          logout() {
            localStorage.removeItem("casevalueToken");
            localStorage.removeItem("casevalueEmail");
            window.dispatchEvent(new Event("logout-success"));
            location.reload();
          },
        };
      }
